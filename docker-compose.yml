version: '3.8'

services:
  db:
    image: postgres:15
    container_name: codekitchen_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: codekitchen
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: codekitchen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: codekitchen_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/codekitchen
      SPRING_DATASOURCE_USERNAME: codekitchen
      SPRING_DATASOURCE_PASSWORD: 12345678
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres_data: